<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Client Login — RiseUp Security</title>
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="../css/glass.css" />
  <link rel="stylesheet" href="../css/animations.css" />
</head>
<body>
  <div id="navbar-wrapper"></div>

  <section class="auth-page">
    <div class="auth-bg"></div>

    <!-- Decorative orbs -->
    <div class="orb orb-1" style="opacity:0.5;"></div>
    <div class="orb orb-2" style="opacity:0.4;"></div>

    <div class="auth-card">
      <div class="auth-logo">
        <svg width="32" height="32" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M18 3L32 10V20C32 27.2 25.8 33.4 18 36C10.2 33.4 4 27.2 4 20V10L18 3Z"
            fill="rgba(0,230,118,0.12)" stroke="#00E676" stroke-width="1.5"/>
          <path d="M12 18L16 22L24 14" stroke="#00E676" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        RiseUp Security
      </div>

      <h2 class="auth-title">Welcome Back</h2>
      <p class="auth-subtitle">Sign in to your client portal to view your active services and reports.</p>

      <div id="auth-error" class="auth-error"></div>

      <form id="login-form" novalidate>
        <div class="form-group">
          <label for="login-email">Email Address</label>
          <input type="email" id="login-email" placeholder="you@company.co.za" autocomplete="email" required />
        </div>

        <div class="form-group">
          <label for="login-password">Password</label>
          <div style="position:relative;">
            <input type="password" id="login-password" placeholder="Enter your password" autocomplete="current-password" required style="padding-right:44px;" />
            <button type="button" id="toggle-pw" aria-label="Toggle password" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--text-muted);display:flex;align-items:center;transition:color 0.2s;">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" id="pw-eye">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
        </div>

        <div style="display:flex;justify-content:flex-end;margin-bottom:20px;">
          <a href="#" style="font-size:0.82rem;color:var(--gold);">Forgot password?</a>
        </div>

        <button type="submit" class="btn btn-primary" id="login-btn" style="width:100%;justify-content:center;" data-label="Sign In">
          <span>Sign In</span>
        </button>
      </form>

      <div class="auth-divider">
        <div class="auth-divider-line"></div>
        <span>or</span>
        <div class="auth-divider-line"></div>
      </div>

      <!-- Demo login -->
      <button id="demo-login" class="btn btn-outline" style="width:100%;justify-content:center;margin-bottom:4px;">
        Use Demo Account
      </button>
      <p style="text-align:center;font-size:0.75rem;color:var(--text-muted);margin-bottom:16px;">Demo: demo@riseupsecurity.co.za / demo1234</p>

      <div class="auth-switch">
        Don't have an account? <a href="register.html">Register here</a>
      </div>
    </div>
  </section>

  <script src="../js/components.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/main.js"></script>
  <script>
    // Password visibility toggle
    document.getElementById('toggle-pw')?.addEventListener('click', function () {
      const input = document.getElementById('login-password');
      input.type = input.type === 'password' ? 'text' : 'password';
      this.style.color = input.type === 'text' ? 'var(--gold)' : 'var(--text-muted)';
    });

    // Demo login — bypass backend for showcase
    document.getElementById('demo-login')?.addEventListener('click', function () {
      document.getElementById('login-email').value    = 'demo@riseupsecurity.co.za';
      document.getElementById('login-password').value = 'demo1234';

      // Store demo session and redirect
      localStorage.setItem('rs_token', 'demo-token-xyz');
      localStorage.setItem('rs_user', JSON.stringify({
        name:  'Demo Client',
        email: 'demo@riseupsecurity.co.za',
        role:  'client'
      }));

      this.innerHTML = '<div class="spinner"></div>';
      this.disabled = true;

      setTimeout(() => {
        window.location.href = 'dashboard.html';
      }, 800);
    });
  </script>
</body>
</html>
